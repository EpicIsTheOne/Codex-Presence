name: Build release

on:
  workflow_dispatch:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm test
      - run: npm run package:win
      - uses: actions/upload-artifact@v4
        with:
          name: windows-x64
          path: |
            release/*.exe
            release/*.blockmap
            release/latest.yml

  linux:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm test
      - run: npm run package:linux
      - uses: actions/upload-artifact@v4
        with:
          name: linux-x64
          path: |
            release/*.AppImage
            release/*.deb
            release/latest-linux.yml

  macos:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm test
      - run: npm run package:mac
      - uses: actions/upload-artifact@v4
        with:
          name: macos-unsigned
          path: |
            release/*.dmg
            release/*.zip
            release/latest-mac.yml

  publish:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [windows, linux, macos]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true
      - name: Generate checksums
        run: sha256sum artifacts/* > artifacts/SHA256SUMS.txt
      - uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          generate_release_notes: true
          body: |
            ## Platform notes
            - Windows x64 installer is unsigned.
            - macOS Intel and Apple Silicon builds are unsigned and not notarized.
            - Linux tray support depends on the desktop environment and AppIndicator availability.
