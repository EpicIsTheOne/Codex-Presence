name: Build release

on:
  workflow_dispatch:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm test
      - name: Package Windows
        shell: pwsh
        run: |
          npm run package:win 2>&1 | Tee-Object -FilePath package-windows.log
          if ($LASTEXITCODE -ne 0) {
            $detail = ((Get-Content package-windows.log -Tail 60) -replace '%', '%25') -join '%0A'
            Write-Output "::error title=Windows packaging failed::$detail"
            exit 1
          }
      - uses: actions/upload-artifact@v4
        with:
          name: windows-x64
          path: |
            release/*.exe
            release/*.blockmap
            release/latest.yml

  linux:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm test
      - name: Package Linux
        shell: bash
        run: |
          set -o pipefail
          npm run package:linux 2>&1 | tee package-linux.log || {
            detail=$(tail -n 60 package-linux.log | sed ':a;N;$!ba;s/%/%25/g;s/\r/%0D/g;s/\n/%0A/g')
            echo "::error title=Linux packaging failed::$detail"
            exit 1
          }
      - uses: actions/upload-artifact@v4
        with:
          name: linux-x64
          path: |
            release/*.AppImage
            release/*.deb
            release/latest-linux.yml

  macos:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm test
      - name: Package macOS
        shell: bash
        run: |
          set -o pipefail
          npm run package:mac 2>&1 | tee package-macos.log || {
            detail=$(tail -n 60 package-macos.log | sed ':a;N;$!ba;s/%/%25/g;s/\r/%0D/g;s/\n/%0A/g')
            echo "::error title=macOS packaging failed::$detail"
            exit 1
          }
      - uses: actions/upload-artifact@v4
        with:
          name: macos-unsigned
          path: |
            release/*.dmg
            release/*.zip
            release/latest-mac.yml

  publish:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [windows, linux, macos]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true
      - name: Generate checksums
        run: sha256sum artifacts/* > artifacts/SHA256SUMS.txt
      - uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          generate_release_notes: true
          body: |
            ## Platform notes
            - Windows x64 installer is unsigned.
            - macOS Intel and Apple Silicon builds are unsigned and not notarized.
            - Linux tray support depends on the desktop environment and AppIndicator availability.
