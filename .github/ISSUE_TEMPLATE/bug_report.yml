name: Bug report
description: Report a reproducible Codex Presence problem
title: "[Bug]: "
labels: [bug]
body:
  - type: markdown
    attributes:
      value: Please remove project names and other private information from logs or screenshots.
  - type: dropdown
    id: platform
    attributes:
      label: Platform
      options: [Windows 11, Windows 10, macOS Apple Silicon, macOS Intel, Linux]
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Codex Presence version
      placeholder: 1.0.0
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Reproduction steps
      description: What happened, what did you expect, and how can it be reproduced?
    validations:
      required: true
  - type: textarea
    id: diagnostics
    attributes:
      label: Sanitized diagnostics
      description: Paste the app's exported diagnostics if relevant. Review them before posting.
